<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>🍳 黄大厨炒制动图生成器</title>
  <style>
    body {
      font-family: Arial, "微软雅黑";
      text-align: center;
      margin: 40px;
      background: #fafafa;
    }
    button, input {
      padding: 10px 18px;
      margin: 8px;
      font-size: 15px;
      border-radius: 8px;
      border: none;
      background: #ff7b54;
      color: white;
      cursor: pointer;
    }
    canvas {
      border: 3px solid #ff7b54;
      border-radius: 12px;
      margin-top: 20px;
      max-width: 90%;
      background: white;
    }
  </style>
</head>
<body>

<h2>🍳 黄大厨炒制动图生成器</h2>
<input type="file" id="upload" accept="image/*" onchange="loadImage(event)">
<canvas id="canvas" width="320" height="320"></canvas>
<br>

<button onclick="changeSpeed()">速度</button>
<button onclick="flipImage()">翻转</button>
<button onclick="exportGIF()">导出GIF</button>

<script src="https://cdn.jsdelivr.net/npm/gif.js/dist/gif.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let img = null;
let speed = 180;
let flip = 1;

// 上传图片
function loadImage(e) {
  const file = new FileReader();
  file.onload = function(event){
    img = new Image();
    img.onload = draw;
    img.src = event.target.result;
  }
  file.readAsDataURL(e.target.files[0]);
}

// 绘制画面
function draw() {
  if (!img) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.scale(flip,1);
  ctx.drawImage(img, flip<0?canvas.width:0,0,canvas.width,canvas.height);
  ctx.restore();
}

// 功能按钮
function changeSpeed() { speed = speed == 180 ? 100 : 180; }
function flipImage() { flip *= -1; draw(); }

// 导出GIF
function exportGIF() {
  const gif = new GIF({
    workers: 2,
    quality: 10,
    width: canvas.width,
    height: canvas.height,
    workerScript: 'https://cdn.jsdelivr.net/npm/gif.js/dist/gif.worker.js'
  });

  for(let i=0;i<12;i++){
    gif.addFrame(canvas, {delay:speed});
  }

  gif.on('finished', (blob) => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '黄大厨爆炒.gif';
    a.click();
  });

  gif.render();
}
</script>
</body>
</html>
